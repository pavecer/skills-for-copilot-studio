name: Known Issue (KB)
description: Document a known issue with symptom, root cause, and mitigation for the troubleshoot agent's knowledge base.
labels: ["kb"]
body:
  - type: dropdown
    id: affected-agent
    attributes:
      label: Affected Agent or Skill
      description: Which agent or skill does this issue affect?
      options:
        - copilot-studio-author
        - copilot-studio-manage
        - copilot-studio-test
        - copilot-studio-troubleshoot
        - validate
        - new-topic
        - add-node
        - add-action
        - edit-action
        - add-knowledge
        - add-generative-answers
        - add-other-agents
        - add-adaptive-card
        - add-global-variable
        - edit-agent
        - edit-triggers
        - patterns
        - authoring-tips
        - lookup-schema
        - list-kinds
        - list-topics
        - run-tests
        - chat-with-agent
        - known-issues
        - int-project-context
        - int-reference
        - All agents / General
    validations:
      required: true

  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What does the user observe? Describe the visible behavior, error message, or unexpected output.
      placeholder: |
        The agent generates a topic with kind: SendMessage instead of kind: SendActivity,
        causing validation to fail with "unknown kind value".
    validations:
      required: true

  - type: textarea
    id: root-cause
    attributes:
      label: Root Cause
      description: Why does this happen? Include the specific SKILL.md instruction, schema gap, or model behavior that causes it.
      placeholder: |
        The int-reference skill's action types table listed SendMessage as an example
        in a code comment, causing the model to use it as a valid kind value.
    validations:
      required: true

  - type: textarea
    id: mitigation
    attributes:
      label: Mitigation / Workaround
      description: How can the user fix or work around this issue right now? Be specific — include exact YAML, skill invocations, or steps.
      placeholder: |
        Replace `kind: SendMessage` with `kind: SendActivity` in the generated topic.
        Then run `/copilot-studio:validate` to confirm no other issues remain.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: fix-status
    attributes:
      label: Fix Status
      description: Is there a permanent fix in progress or already shipped? Link the PR or commit if applicable.
      placeholder: |
        Fixed in PR #45 — removed the misleading comment from int-reference/SKILL.md.
        Ships in next release. Workaround above applies until then.
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Reproduction Steps
      description: Exact steps to reproduce. Include the agent, prompt, and what the agent produced.
      placeholder: |
        1. Agent: copilot-studio-author
        2. Prompt: `/copilot-studio:copilot-studio-author Create a topic that sends a welcome message`
        3. Agent generates topic with kind: SendMessage
        4. Run `/copilot-studio:validate` — fails with "unknown kind value: SendMessage"
      render: markdown
    validations:
      required: false
